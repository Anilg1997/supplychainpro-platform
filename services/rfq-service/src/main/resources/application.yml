server:
  port: 8086

spring:
  application:
    name: rfq-service
  datasource:
    url: jdbc:postgresql://postgres:5432/supplychainpro?currentSchema=procurement_schema
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:SupplyChain@2024}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://service-registry:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

logging:
  level:
    com.supplychainpro.rfq: DEBUG
