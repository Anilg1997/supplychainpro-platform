server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:Redis@2024}

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/

jwt:
  secret: ${JWT_SECRET:SupplyChainPro_JWT_Min32CharSecret_2024}

# Rate limiting configuration
rate-limit:
  requests-per-minute: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.supplychainpro.apigateway: DEBUG
