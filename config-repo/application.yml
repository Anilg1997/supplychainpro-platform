# ============================================
# SupplyChain Pro - Shared Application Config
# ============================================

spring:
  application:
    name: supplychainpro
  cloud:
    discovery:
      enabled: true
      client:
        service-url:
          defaultZone: http://service-registry:8761/eureka/
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
          auto-create-topics: true
  zipkin:
    base-url: http://zipkin:9411
    enabled: true
  micrometer:
    tracing:
      propagation:
        type: b3
    export:
      zipkin:
        enabled: true

# Eureka client for all services
eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 30

# Actuator for all services
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

# Resilience4j defaults
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      default:
        timeoutDuration: 10s

# Logging
logging:
  level:
    com.supplychainpro: INFO
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Kafka common config
kafka:
  topics:
    partitions: 3
    replication-factor: 1

# JWT common config
jwt:
  secret: ${JWT_SECRET:SupplyChainPro_JWT_Min32CharSecret_2024}
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 604800000  # 7 days
