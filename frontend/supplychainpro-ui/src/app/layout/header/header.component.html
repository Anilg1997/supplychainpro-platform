<mat-toolbar class="header-toolbar">
  <button mat-icon-button (click)="toggleSidenav.emit()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="header-title">SupplyChain Pro</span>
  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="notifMenu" class="notif-btn">
    <mat-icon matBadge="3" matBadgeColor="warn">notifications</mat-icon>
  </button>
  <mat-menu #notifMenu="matMenu">
    <button mat-menu-item><mat-icon>info</mat-icon> PO-2024-0015 approved</button>
    <button mat-menu-item><mat-icon>warning</mat-icon> Inventory low: SKU-0082</button>
    <button mat-menu-item><mat-icon>check_circle</mat-icon> Shipment SHP-034 delivered</button>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/notifications">View all</button>
  </mat-menu>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-btn">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <div class="user-info" mat-menu-item disabled>
      <div class="user-email">{{ user?.email }}</div>
      <div class="user-roles">{{ user?.roles?.join(', ') }}</div>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </mat-menu>
</mat-toolbar>
